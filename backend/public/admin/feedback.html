<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Feedback | e_Touring</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="admin-style.css">
</head>
<body>
    <div class="admin-wrapper">
        <aside class="sidebar"><div class="logo"><i class="fas fa-tree"></i> e_Touring</div>
            <ul class="nav-menu">
                <li><a href="dashboard.html"><i class="fas fa-tachometer-alt"></i> Dashboard</a></li>
                <li><a href="events.html"><i class="fas fa-calendar-alt"></i> Events</a></li>
                <li><a href="plans.html"><i class="fas fa-map-marked-alt"></i> Plans</a></li>
                <li><a href="feedback.html" class="active"><i class="fas fa-comment-dots"></i> Feedback</a></li>
                <li><a href="#" id="logoutBtn"><i class="fas fa-sign-out-alt"></i> Logout</a></li>
            </ul>
        </aside>
        <main class="main-content">
            <h2>Manage Feedback</h2>
            <div class="filter-buttons" style="display:flex; gap:1rem; margin-bottom:1rem;">
                <button class="btn" onclick="filterFeedback('all')">All</button>
                <button class="btn" onclick="filterFeedback('pending')">Pending</button>
                <button class="btn" onclick="filterFeedback('approved')">Approved</button>
            </div>
            <div class="table-container"><table class="table"><thead><tr><th>Date</th><th>Name</th><th>Rating</th><th>Message</th><th>Status</th><th>Actions</th></tr></thead><tbody id="feedbackBody"></tbody></table></div>
        </main>
    </div>

    <script>
        const API_URL = localStorage.getItem('API_BASE_URL') || 'https://etouring-backend.onrender.com';
        const token = localStorage.getItem('adminToken');
        if (!token) window.location.href = 'login.html';
        
        let allFeedback = [], currentFilter = 'all';
        
        async function loadFeedback() {
            const res = await fetch(`${API_URL}/api/feedback/all`, { headers: { 'Authorization': `Bearer ${token}` } });
            allFeedback = await res.json();
            renderFeedback();
        }
        
        function renderFeedback() {
            let filtered = allFeedback;
            if (currentFilter === 'pending') filtered = allFeedback.filter(f => !f.approved);
            if (currentFilter === 'approved') filtered = allFeedback.filter(f => f.approved);
            document.getElementById('feedbackBody').innerHTML = filtered.map(fb => `
                <tr>
                    <td>${new Date(fb.createdAt).toLocaleDateString()}</td>
                    <td>${escapeHtml(fb.name)}</td>
                    <td>${'★'.repeat(fb.rating)}${'☆'.repeat(5-fb.rating)}</td>
                    <td style="max-width:300px">${escapeHtml(fb.message.substring(0,100))}...</td>
                    <td><span class="badge ${fb.approved ? 'badge-approved' : 'badge-pending'}">${fb.approved ? 'Approved' : 'Pending'}</span></td>
                    <td>${!fb.approved ? `<button class="btn btn-success" onclick="approveFeedback('${fb._id}')">Approve</button>` : ''} <button class="btn btn-danger" onclick="deleteFeedback('${fb._id}')">Delete</button></td>
                </tr>
            `).join('');
        }
        
        async function approveFeedback(id) {
            await fetch(`${API_URL}/api/feedback/${id}/approve`, { method: 'PUT', headers: { 'Authorization': `Bearer ${token}` } });
            loadFeedback();
        }
        
        async function deleteFeedback(id) {
            if (!confirm('Delete?')) return;
            await fetch(`${API_URL}/api/feedback/${id}`, { method: 'DELETE', headers: { 'Authorization': `Bearer ${token}` } });
            loadFeedback();
        }
        
        function filterFeedback(type) { currentFilter = type; renderFeedback(); }
        function escapeHtml(str) { if (!str) return ''; return str.replace(/[&<>]/g, m => m === '&' ? '&amp;' : m === '<' ? '&lt;' : '&gt;'); }
        
        document.getElementById('logoutBtn').onclick = () => { localStorage.removeItem('adminToken'); window.location.href = 'login.html'; };
        loadFeedback();
    </script>
</body>
</html>
