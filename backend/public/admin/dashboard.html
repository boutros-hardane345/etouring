<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard | e_Touring</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="admin-style.css">
</head>
<body>
    <div class="admin-wrapper">
        <aside class="sidebar">
            <div class="logo"><i class="fas fa-tree"></i> e_Touring Admin</div>
            <ul class="nav-menu">
                <li><a href="dashboard.html" class="active"><i class="fas fa-tachometer-alt"></i> Dashboard</a></li>
                <li><a href="events.html"><i class="fas fa-calendar-alt"></i> Events</a></li>
                <li><a href="plans.html"><i class="fas fa-map-marked-alt"></i> Plans</a></li>
                <li><a href="feedback.html"><i class="fas fa-comment-dots"></i> Feedback</a></li>
                <li><a href="#" id="logoutBtn"><i class="fas fa-sign-out-alt"></i> Logout</a></li>
            </ul>
        </aside>
        <main class="main-content">
            <div class="welcome-banner"><h2>Welcome back, Admin!</h2><p>Manage your e_Touring platform</p></div>
            <div class="stats-grid" id="statsGrid">
                <div class="stat-card"><i class="fas fa-calendar-alt"></i><h3 id="eventsCount">0</h3><p>Total Events</p></div>
                <div class="stat-card"><i class="fas fa-map-marked-alt"></i><h3 id="plansCount">0</h3><p>Active Plans</p></div>
                <div class="stat-card"><i class="fas fa-clock"></i><h3 id="pendingFeedback">0</h3><p>Pending Feedback</p></div>
                <div class="stat-card"><i class="fas fa-star"></i><h3 id="totalFeedback">0</h3><p>Total Reviews</p></div>
            </div>
        </main>
    </div>
    <script>
        const API_URL = localStorage.getItem('API_BASE_URL') || 'https://etouring-backend.onrender.com';
        const token = localStorage.getItem('adminToken');
        if (!token) window.location.href = 'login.html';

        async function fetchStats() {
            try {
                const res = await fetch(`${API_URL}/api/admin/stats`, { headers: { 'Authorization': `Bearer ${token}` } });
                if (!res.ok) throw new Error();
                const stats = await res.json();
                document.getElementById('eventsCount').innerText = stats.eventsCount;
                document.getElementById('plansCount').innerText = stats.plansCount;
                document.getElementById('pendingFeedback').innerText = stats.pendingFeedback;
                document.getElementById('totalFeedback').innerText = stats.totalFeedback;
            } catch(err) { console.error(err); }
        }
        
        document.getElementById('logoutBtn').addEventListener('click', () => {
            localStorage.removeItem('adminToken');
            window.location.href = 'login.html';
        });
        
        fetchStats();
    </script>
</body>
</html>
